<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slightly Biased Scheduler</title>
  <link rel="stylesheet" href="css/styles.css" />
  <!-- Fonts loaded via @font-face in css/styles.css (fonts/ folder) -->
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="sidebar-header">
        <span class="logo">🧵</span>
        <h1>Slightly Biased Scheduler</h1>
      </div>
      <ul class="nav-links">
        <li><a href="#" data-view="dashboard" class="active">
          <span class="nav-icon">🏠</span> Dashboard
        </a></li>
        <li><a href="#" data-view="weekly">
          <span class="nav-icon">📅</span> Weekly View
        </a></li>
        <li><a href="#" data-view="daily">
          <span class="nav-icon">☀️</span> Daily Focus
        </a></li>
<li><a href="#" data-view="tasks">
          <span class="nav-icon">✅</span> All Tasks
        </a></li>
        <li><a href="#" data-view="settings">
          <span class="nav-icon">⚙️</span> Settings
        </a></li>
      </ul>
      <div class="sidebar-footer">
        <button id="btn-run-scheduler" class="btn-secondary btn-sm" title="Run auto-scheduler">
          🗓 Run Scheduler
        </button>
        <button id="btn-connect-calendar" class="btn-secondary btn-sm" title="Connect Google Calendar">
          📆 Connect Calendar
        </button>
      </div>
    </nav>

  <!-- Mobile bottom nav (hidden on desktop) -->
  <nav id="mobile-nav">
    <a href="#" data-view="dashboard" class="mobile-nav-item active">
      <span class="mobile-nav-icon">🏠</span>
      <span class="mobile-nav-label">Home</span>
    </a>
    <a href="#" data-view="weekly" class="mobile-nav-item">
      <span class="mobile-nav-icon">📅</span>
      <span class="mobile-nav-label">Weekly</span>
    </a>
    <a href="#" data-view="daily" class="mobile-nav-item">
      <span class="mobile-nav-icon">☀️</span>
      <span class="mobile-nav-label">Today</span>
    </a>
    <a href="#" data-view="tasks" class="mobile-nav-item">
      <span class="mobile-nav-icon">✅</span>
      <span class="mobile-nav-label">Tasks</span>
    </a>
    <a href="#" data-view="settings" class="mobile-nav-item">
      <span class="mobile-nav-icon">⚙️</span>
      <span class="mobile-nav-label">Settings</span>
    </a>
  </nav>

    <!-- Main content -->
    <main id="main-content">
      <!-- Config banner (shown when Trello is not connected) -->
      <div id="config-banner" class="banner banner-warn" style="display:none;">
        <strong>🔗 Trello not connected.</strong>
        Connect your Trello account to load boards and cards.
        <a href="#" data-view="settings">Go to Settings</a>
      </div>

      <!-- Views (only one visible at a time) -->
      <div id="view-dashboard" class="view active"></div>
      <div id="view-weekly"    class="view"></div>
      <div id="view-daily"     class="view"></div>
<div id="view-tasks"     class="view"></div>
      <div id="view-settings"  class="view"></div>
    </main>
  </div>

  <!-- ===== MODALS ===== -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-box" class="modal-box">
      <button id="modal-close" class="modal-close" aria-label="Close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- ===== TOAST ===== -->
  <div id="toast-container"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
